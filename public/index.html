<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReyCloudShop AI</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

</head>

<body>

<div class="background"></div>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

<i class="fa-solid fa-robot"></i>

<h2>ReyCloudShop AI</h2>

</div>

<button id="newChat">

<i class="fa-solid fa-plus"></i>

<span>New Chat</span>

</button>

<div class="history">

<h4>Recent Chat</h4>

<div id="historyList"></div>

</div>

<div class="sidebar-bottom">

<button id="settingsOpen">

<i class="fa-solid fa-gear"></i>

Settings

</button>

</div>

</aside>

<!-- Chat -->

<main class="chat">

<header class="chat-header">

<div>

<h2>ReyBot AI</h2>

<p>Powered by OpenAI</p>

</div>

<div class="online">

<span class="status"></span>

Online

</div>

</header>

<section id="chatBox" class="chat-box">

<div class="welcome">

🤖

<h1>Selamat Datang</h1>

<p>

Silakan tanyakan apa saja.

Saya siap membantu coding, website, Node.js,
WhatsApp Bot, Roblox, API, dan lainnya.

</p>

</div>

</section>

<footer class="chat-input">

<div class="input-box">

<textarea
id="message"
rows="1"
placeholder="Tulis pesan..."></textarea>

<button id="send">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

<div class="hint">

Enter = Kirim • Shift + Enter = Baris Baru

</div>

</footer>

</main>

</div>

<!-- SETTINGS -->

<div class="modal" id="settingsModal">

<div class="modal-content">

<div class="modal-header">

<h2>

<i class="fa-solid fa-sliders"></i>

Settings

</h2>

<button id="closeSettings">

<i class="fa-solid fa-xmark"></i>

</button>

</div>

<div class="setting">

<label>Model AI</label>

<select id="model">

<option value="gpt-5">GPT-5</option>

<option value="gpt-5-mini">GPT-5 Mini</option>

<option value="gpt-5-nano">GPT-5 Nano</option>

</select>

</div>

<div class="setting">

<label>Custom Prompt</label>

<textarea
id="systemPrompt"
rows="12">

Kamu adalah ReyBot AI.

Selalu gunakan Bahasa Indonesia.

Jawab singkat, jelas, dan akurat.

Fokus membantu:

- WhatsApp Bot
- Node.js
- Website
- API
- Roblox
- Debug Error

</textarea>

</div>

<div class="setting">

<label>

<input
type="checkbox"
id="saveHistory"
checked>

Simpan Riwayat Chat

</label>

</div>

<div class="setting">

<label>

<input
type="checkbox"
id="typing"
checked>

Efek AI Mengetik

</label>

</div>

<div class="setting">

<label>

<input
type="checkbox"
id="dark"
checked>

Dark Mode

</label>

</div>

<div class="buttons">

<button id="saveSetting">

<i class="fa-solid fa-floppy-disk"></i>

Simpan

</button>

<button id="resetPrompt">

<i class="fa-solid fa-rotate-left"></i>

Reset Prompt

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
